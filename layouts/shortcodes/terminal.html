<div class="terminal-window">
  <div class="terminal-header">
    <div class="terminal-controls">
      <div class="terminal-button close"></div>
      <div class="terminal-button minimize"></div>
      <div class="terminal-button maximize"></div>
    </div>
    <div class="terminal-title">{{ .Get "title" | default "Terminal" }}</div>
    <button class="copy-button" type="button" aria-label="Copy code">
      <svg class="copy-icon copy-icon-default" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <svg class="copy-icon copy-icon-success" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
  </div>
  <div class="terminal-content">
    {{ .Inner }}
  </div>
</div>
