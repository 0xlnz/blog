<script>
document.addEventListener('DOMContentLoaded', () => {
  // Copy to clipboard functionality
  document.querySelectorAll('.copy-button').forEach(button => {
    button.addEventListener('click', () => {
      const window = button.closest('.terminal-window');
      const container = window.querySelector('.terminal-content');
      
      // Try to find the code element.
      let codeText = '';
      const chromaCode = container.querySelector('.chroma .lntd:last-child pre code');
      const basicCode = container.querySelector('pre code');

      if (chromaCode) {
        codeText = chromaCode.innerText;
      } else if (basicCode) {
        codeText = basicCode.innerText;
      } else {
        // Fallback for plain text content inside terminal shortcode
        codeText = container.innerText;
      }
      
      if (codeText) {
        navigator.clipboard.writeText(codeText).then(() => {
          const originalText = button.innerText;
          button.innerText = 'โ'; // Checkmark emoji
          button.classList.add('copied');
          setTimeout(() => {
            button.innerText = '๐'; // Revert to page emoji
            button.classList.remove('copied');
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy: ', err);
        });
      }
    });
  });

  // Glitch effect trigger
  const glitchElement = document.querySelector('.glitch');
  const originalName = "Lorenzo";
  const glitchChars = "ยกยขยฃยคยฅยฆยงยจยฉยชยซยฌยฎยฏยฐยฑยฒยณยดยตยถยทยธยนยบยปยผยฝยพยฟรรรรรรรรรรรรรรรรรรรรรรรรรรรรรรรรร รกรขรฃรครฅรฆรงรจรฉรชรซรฌรญรฎรฏรฐรฑรฒรณรดรตรถรทรธรนรบรปรผรฝรพรฟ0123456789!@#$%^&*()_+";

  if (glitchElement) {
    function scrambleText() {
      let scrambled = "";
      for (let i = 0; i < originalName.length; i++) {
        if (Math.random() > 0.7) {
          scrambled += glitchChars[Math.floor(Math.random() * glitchChars.length)];
        } else {
          scrambled += originalName[i];
        }
      }
      glitchElement.innerText = scrambled;
    }

    function triggerGlitch() {
      glitchElement.classList.add('active');
      
      // Rapidly scramble text during the glitch
      const scrambleInterval = setInterval(scrambleText, 50);
      
      const duration = Math.random() * 600 + 300;
      
      setTimeout(() => {
        clearInterval(scrambleInterval);
        glitchElement.classList.remove('active');
        glitchElement.innerText = originalName;
        
        const nextInterval = Math.random() * 7000 + 1500;
        setTimeout(triggerGlitch, nextInterval);
      }, duration);
    }
    
    setTimeout(triggerGlitch, 3000);
  }
});
</script>
