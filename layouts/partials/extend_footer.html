<script>
document.addEventListener('DOMContentLoaded', () => {
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Copy to clipboard
  document.querySelectorAll('.copy-button').forEach(button => {
    button.addEventListener('click', async () => {
      const window_ = button.closest('.terminal-window');
      const container = window_.querySelector('.terminal-content');

      const chromaCode = container.querySelector('.chroma .lntd:last-child pre code');
      const basicCode = container.querySelector('pre code');
      const codeText = chromaCode ? chromaCode.innerText
        : basicCode ? basicCode.innerText
        : container.innerText;

      if (!codeText) return;

      try {
        await navigator.clipboard.writeText(codeText);
        button.classList.add('copied');
        button.setAttribute('aria-label', 'Copied');
        setTimeout(() => {
          button.classList.remove('copied');
          button.setAttribute('aria-label', 'Copy code');
        }, 2000);
      } catch (err) {
        button.classList.add('error');
        button.setAttribute('aria-label', 'Copy failed');
        setTimeout(() => {
          button.classList.remove('error');
          button.setAttribute('aria-label', 'Copy code');
        }, 2000);
      }
    });
  });

  // Glitch effect вҖ” hover-triggered, plus one welcome glitch on load.
  // Disabled entirely under prefers-reduced-motion.
  const glitchElement = document.querySelector('.glitch');
  if (!glitchElement || reducedMotion) return;

  const originalName = glitchElement.dataset.text || glitchElement.innerText;
  const glitchChars = "ВЎВўВЈВӨВҘВҰВ§ВЁВ©ВӘВ«В¬В®ВҜВ°ВұВІВіВҙВөВ¶В·ВёВ№ВәВ»ВјВҪВҫВҝГҖГҒГӮГғГ„Г…ГҶГҮГҲГүГҠГӢГҢГҚГҺГҸГҗГ‘Г’Г“Г”Г•Г–Г—ГҳГҷГҡГӣГңГқГһГҹГ ГЎГўГЈГӨГҘГҰГ§ГЁГ©ГӘГ«Г¬ГӯГ®ГҜГ°ГұГІГіГҙГөГ¶Г·ГёГ№ГәГ»ГјГҪГҫГҝ0123456789!@#$%^&*()_+";
  let isGlitching = false;

  function scrambleText() {
    let scrambled = "";
    for (let i = 0; i < originalName.length; i++) {
      scrambled += Math.random() > 0.7
        ? glitchChars[Math.floor(Math.random() * glitchChars.length)]
        : originalName[i];
    }
    glitchElement.innerText = scrambled;
  }

  function triggerGlitch() {
    if (isGlitching) return;
    isGlitching = true;
    glitchElement.classList.add('active');
    const scrambleInterval = setInterval(scrambleText, 50);
    const duration = Math.random() * 600 + 300;
    setTimeout(() => {
      clearInterval(scrambleInterval);
      glitchElement.classList.remove('active');
      glitchElement.innerText = originalName;
      isGlitching = false;
    }, duration);
  }

  glitchElement.addEventListener('mouseenter', triggerGlitch);
  glitchElement.addEventListener('focus', triggerGlitch);
  glitchElement.setAttribute('tabindex', '0');
  setTimeout(triggerGlitch, 600);
});
</script>
